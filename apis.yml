description: >-
  Dean Foods was a leading U.S. food and beverage company and one of the
  largest processors and direct-to-store distributors of fresh fluid milk
  and other dairy products. After filing for Chapter 11 bankruptcy in 2019,
  most of Dean Foods' assets were acquired by Dairy Farmers of America
  (DFA) in 2020. Dean Foods no longer operates as an independent company
  and does not publish a public developer API; surviving brands are now
  managed under DFA. This profile is retained for historical reference.
